# Configuration

# -------- Directories --------
# source_images_dir : IGN JP2 tiles + dalles.shp
# model_dir         : folder with model_bdappv_cls.pth and model_bdappv_seg.pth
# source_commune_dir: folder with communes-20210101.shp
# source_topo_dir   : BDTOPO folder (BATIMENT.shp, ZONE_D_ACTIVITE_OU_D_INTERET.shp)
# temp_dir          : working directory (auxiliary + intermediate files).
#                     Deleted automatically on successful run; kept on crash for resuming.
# outputs_dir       : final outputs (geojson + csv)

source_images_dir :
model_dir : 

source_commune_dir : 
source_topo_dir : 

temp_dir    : 'temp'
outputs_dir : 'data'

# -------- Pipeline switches --------
run_classification : True
run_segmentation   : True
run_aggregation    : True

# -------- Common parameters --------
patch_size : 299
device : 'cuda'

# tiles_list : optional list of tile names to restrict processing (local testing)
#   example:  tiles_list : ['0630_6845', '0630_6850']
tiles_list:
  - 01-2024-0850-6565-LA93-0M20-E080

# -------- Classification --------
cls_batch_size : 512
cls_threshold  : 0.4
cls_model      : 'model_bdappv_cls'

# -------- Segmentation --------
seg_batch_size : 64
seg_threshold  : 0.46
num_gpu        : 1
seg_model      : 'model_bdappv_seg'

# -------- Aggregation --------
filter_building : True

# tilt_method    : 'lut' (recommended, LUT-France embedded) | 'constant'
# azimuth_method : 'bounding-box'
# ic_method      : 'clustered' (recommended) | 'linear'
tilt_method    : 'lut'
azimuth_method : 'bounding-box'
ic_method      : 'clustered'
ic_clusters    : 4
constant_tilt  : 27.